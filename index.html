<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--gold:#c9a84c;--gold2:#e8c96b;--text:#f0f0f0;--muted:#888;--border:#222230}
  html{scroll-behavior:smooth}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
  nav{position:fixed;top:0;width:100%;z-index:100;padding:16px 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,15,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .logo{font-size:1.3rem;font-weight:700;letter-spacing:1px;color:var(--gold)}
  .logo span{color:var(--text)}
  .nav-right{display:flex;align-items:center;gap:24px}
  nav ul{list-style:none;display:flex;gap:28px}
  nav a{color:var(--muted);text-decoration:none;font-size:.9rem;letter-spacing:.5px;transition:color .2s}
  nav a:hover{color:var(--gold)}
  /* LANGUAGE SELECTOR */
  .lang-selector{position:relative}
  .lang-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:20px;color:var(--gold);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px}
  .lang-btn:hover{background:rgba(201,168,76,.15)}
  .lang-btn .flag{font-size:1rem}
  .lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:150px;display:none;box-shadow:0 12px 32px rgba(0,0,0,.5)}
  .lang-dropdown.open{display:block}
  .lang-option{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:background .15s;font-size:.87rem}
  .lang-option:hover{background:rgba(201,168,76,.08)}
  .lang-option.active{color:var(--gold);font-weight:600}
  .lang-option .flag{font-size:1.1rem}
  /* HERO */
  .hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 5% 80px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,.12),transparent)}
  .hero-badge{display:inline-block;padding:6px 16px;border:1px solid var(--gold);border-radius:20px;font-size:.78rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:24px}
  .hero h1{font-size:clamp(2.2rem,5vw,4rem);font-weight:800;line-height:1.15;max-width:700px;margin:0 auto 20px}
  .hero h1 em{font-style:normal;color:var(--gold)}
  .hero p{font-size:1.1rem;color:var(--muted);max-width:480px;margin:0 auto 40px}
  .btn{display:inline-block;padding:14px 32px;background:var(--gold);color:#0a0a0f;font-weight:700;font-size:.95rem;border-radius:6px;text-decoration:none;transition:all .2s;border:none;cursor:pointer;letter-spacing:.5px}
  .btn:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.3)}
  .btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold);margin-left:12px}
  .btn-outline:hover{background:rgba(201,168,76,.1)}
  .hero-stats{display:flex;gap:48px;justify-content:center;margin-top:60px;flex-wrap:wrap}
  .stat{text-align:center}
  .stat strong{display:block;font-size:2rem;font-weight:800;color:var(--gold)}
  .stat span{font-size:.85rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  section{padding:90px 5%}
  .section-label{font-size:.78rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
  .section-title{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:800;margin-bottom:16px}
  .section-sub{color:var(--muted);max-width:500px;margin-bottom:50px}
  #catalogo{background:var(--bg2)}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px}
  .filter-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .2s}
  .filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07)}
  .books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px}
  .book-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s;cursor:pointer}
  .book-card:hover{transform:translateY(-6px);border-color:rgba(201,168,76,.4);box-shadow:0 16px 40px rgba(0,0,0,.4)}
  .book-cover{height:200px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .book-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.5))}
  .badge{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:4px;font-size:.72rem;font-weight:700;z-index:1;letter-spacing:.5px}
  .badge.new{background:var(--gold);color:#0a0a0f}
  .badge.best{background:#2a5caa;color:#fff}
  .book-info{padding:18px}
  .book-cat{font-size:.75rem;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
  .book-title{font-size:1rem;font-weight:700;margin-bottom:6px;line-height:1.3}
  .book-desc{font-size:.83rem;color:var(--muted);margin-bottom:16px;line-height:1.5}
  .book-footer{display:flex;align-items:center;justify-content:space-between}
  .price{font-size:1.2rem;font-weight:800;color:var(--gold)}
  .price-old{font-size:.8rem;color:var(--muted);text-decoration:line-through;margin-left:6px}
  .buy-btn{padding:8px 16px;background:var(--gold);color:#0a0a0f;border:none;border-radius:6px;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s}
  .buy-btn:hover{background:var(--gold2)}
  #testimonios{background:var(--bg)}
  .testimonials-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
  .testi-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:28px;transition:border-color .3s}
  .testi-card:hover{border-color:rgba(201,168,76,.3)}
  .stars{color:var(--gold);font-size:1rem;margin-bottom:14px;letter-spacing:2px}
  .testi-text{color:#ccc;font-size:.9rem;line-height:1.7;margin-bottom:20px;font-style:italic}
  .testi-author{display:flex;align-items:center;gap:12px}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;background:linear-gradient(135deg,var(--gold),#8b6914)}
  .author-info strong{display:block;font-size:.9rem}
  .author-info span{font-size:.78rem;color:var(--muted)}
  .cta-section{background:linear-gradient(135deg,#12121a,#1a1a26);text-align:center;padding:90px 5%;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .cta-section h2{font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;margin-bottom:16px}
  .cta-section p{color:var(--muted);margin-bottom:36px;font-size:1.05rem}
  footer{background:var(--bg2);padding:48px 5% 28px;border-top:1px solid var(--border)}
  .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;margin-bottom:40px}
  .footer-brand p{color:var(--muted);font-size:.87rem;margin-top:12px;line-height:1.6;max-width:260px}
  footer h4{font-size:.85rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
  footer ul{list-style:none}
  footer li{margin-bottom:10px}
  footer a{color:var(--muted);text-decoration:none;font-size:.87rem;transition:color .2s}
  footer a:hover{color:var(--gold)}
  .footer-bottom{border-top:1px solid var(--border);padding-top:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .footer-bottom p{color:var(--muted);font-size:.82rem}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg3);border:1px solid var(--border);border-radius:16px;max-width:480px;width:100%;padding:36px;position:relative}
  .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
  .modal h3{font-size:1.4rem;font-weight:800;margin-bottom:8px}
  .modal .modal-cat{color:var(--gold);font-size:.8rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
  .modal p{color:#bbb;font-size:.9rem;line-height:1.7;margin-bottom:20px}
  .modal-price{font-size:2rem;font-weight:800;color:var(--gold);margin-bottom:24px}
  .modal-price span{font-size:.9rem;color:var(--muted);font-weight:400;text-decoration:line-through;margin-left:8px}
  .modal .btn{width:100%;text-align:center;display:block}
  @media(max-width:640px){nav ul{display:none}.hero-stats{gap:28px}.footer-grid{grid-template-columns:1fr}.btn-outline{margin-left:0;margin-top:12px}}

</head>

const booksMeta = [
  {id:1,emoji:"💰",cat:"finance",price:"$14.99",old:"$24.99",badge:"best",color:"#1a2a1a"},
  {id:2,emoji:"📊",cat:"invest",price:"$17.99",old:"$29.99",badge:"new",color:"#1a1a2a"},
  {id:3,emoji:"🚀",cat:"business",price:"$19.99",old:null,badge:null,color:"#2a1a1a"},
  {id:4,emoji:"💎",cat:"finance",price:"$22.99",old:"$34.99",badge:"best",color:"#1a221a"},
  {id:5,emoji:"📈",cat:"invest",price:"$16.99",old:null,badge:"new",color:"#1a1a2a"},
  {id:6,emoji:"💼",cat:"business",price:"$15.99",old:"$22.99",badge:null,color:"#221a1a"},
];

const catKeys = {finance:"filter.finance",invest:"filter.invest",business:"filter.business"};
let lang = 'es';
let currentFilter = 'all';

function t(key){
  return key.split('.').reduce((o,k)=>o&&o[k],i18n[lang]) || key;
}

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{
    el.innerHTML = t(el.dataset.i18nHtml);
  });
}

function renderFilters(){
  const c = i18n[lang];
  document.getElementById('filtersContainer').innerHTML =
    ['all','finance','invest','business'].map(f=>`
      <button class="filter-btn${currentFilter===f?' active':''}" onclick="filterBooks(this,'${f}')">
        ${f==='all'?c.filter.all:t('filter.'+f)}
      </button>`).join('');
}

function renderBooks(){
  const l = i18n[lang];
  const grid = document.getElementById('booksGrid');
  const filtered = currentFilter==='all' ? booksMeta : booksMeta.filter(b=>b.cat===currentFilter);
  grid.innerHTML = filtered.map(b=>{
    const info = l.books[b.id-1];
    const badgeText = b.badge ? (b.badge==='new'?l.badge.new:l.badge.best) : '';
    return `<div class="book-card" onclick="openModal(${b.id})">
      <div class="book-cover" style="background:linear-gradient(135deg,${b.color},#0a0a0f)">
        <span style="font-size:4rem;z-index:1">${b.emoji}</span>
        ${b.badge?`<div class="badge ${b.badge}">${badgeText}</div>`:''}
      </div>
      <div class="book-info">
        <div class="book-cat">${info.catLabel}</div>
        <div class="book-title">${info.title}</div>
        <div class="book-desc">${info.desc}</div>
        <div class="book-footer">
          <div><span class="price">${b.price}</span>${b.old?`<span class="price-old">${b.old}</span>`:''}</div>
          <button class="buy-btn" onclick="event.stopPropagation();openModal(${b.id})">${t('modal.viewmore')}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderTestimonials(){
  const list = i18n[lang].testimonials;
  const stars = ['★★★★★','★★★★★','★★★★★','★★★★☆','★★★★★','★★★★★'];
  const initials = list.map(t=>t.name.split(' ').map(w=>w[0]).join(''));
  document.getElementById('testiGrid').innerHTML = list.map((t,i)=>`
    <div class="testi-card">
      <div class="stars">${stars[i]}</div>
      <p class="testi-text">${t.text}</p>
      <div class="testi-author">
        <div class="avatar">${initials[i]}</div>
        <div class="author-info"><strong>${t.name}</strong><span>${t.role}</span></div>
      </div>
    </div>`).join('');
}

function renderAll(){
  applyTranslations();
  renderFilters();
  renderBooks();
  renderTestimonials();
  document.getElementById('m-buybtn').textContent = t('modal.buynow');
}

function filterBooks(btn, cat){
  currentFilter = cat;
  renderFilters();
  renderBooks();
}

function openModal(id){
  const b = booksMeta[id-1];
  const info = i18n[lang].books[id-1];
  document.getElementById('m-cat').textContent = info.catLabel;
  document.getElementById('m-title').textContent = b.emoji+' '+info.title;
  document.getElementById('m-desc').textContent = info.desc+' '+t('modal.extra');
  document.getElementById('m-price').innerHTML = b.price+(b.old?`<span>${b.old}</span>`:'');
  document.getElementById('m-buybtn').textContent = t('modal.buynow');
  document.getElementById('modal').classList.add('open');
}

function closeModal(e){if(e.target.id==='modal') document.getElementById('modal').classList.remove('open')}

function setLang(l){
  lang = l;
  const flags = {es:'🇪🇸',en:'🇺🇸',pt:'🇧🇷'};
  const labels = {es:'ES',en:'EN',pt:'PT'};
  document.getElementById('currentFlag').textContent = flags[l];
  document.getElementById('currentLang').textContent = labels[l];
  document.querySelectorAll('.lang-option').forEach((el,i)=>{
    el.classList.toggle('active',['es','en','pt'][i]===l);
  });
  document.getElementById('langDropdown').classList.remove('open');
  renderAll();
}

function toggleLangMenu(){
  document.getElementById('langDropdown').classList.toggle('open');
}

document.addEventListener('click', e=>{
  if(!e.target.closest('.lang-selector')) document.getElementById('langDropdown').classList.remove('open');
});

renderAll();
</script>
</body>
</html>
